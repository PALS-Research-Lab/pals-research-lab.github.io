<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#002D72"/>

  <!-- Radial spokes from center to outer hex vertices -->
  <line x1="50" y1="50" x2="50" y2="10" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>
  <line x1="50" y1="50" x2="85" y2="30" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>
  <line x1="50" y1="50" x2="85" y2="70" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>
  <line x1="50" y1="50" x2="50" y2="90" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>
  <line x1="50" y1="50" x2="15" y2="70" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>
  <line x1="50" y1="50" x2="15" y2="30" stroke="#FFD100" stroke-width="0.55" opacity="0.3"/>

  <!-- Outer hexagon -->
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30"
           fill="none" stroke="#FFD100" stroke-width="0.9" opacity="0.55"/>

  <!-- Mid hexagon -->
  <polygon points="50,26 71,38 71,62 50,74 29,62 29,38"
           fill="none" stroke="white" stroke-width="0.65" opacity="0.22"/>

  <!-- Inner circle -->
  <circle cx="50" cy="50" r="11" fill="none" stroke="#FFD100" stroke-width="0.75" opacity="0.45"/>

  <!-- Outer vertex nodes -->
  <circle cx="50" cy="10" r="2.2" fill="#FFD100" opacity="0.95"/>
  <circle cx="85" cy="30" r="2.2" fill="#FFD100" opacity="0.95"/>
  <circle cx="85" cy="70" r="2.2" fill="#FFD100" opacity="0.95"/>
  <circle cx="50" cy="90" r="2.2" fill="#FFD100" opacity="0.95"/>
  <circle cx="15" cy="70" r="2.2" fill="#FFD100" opacity="0.95"/>
  <circle cx="15" cy="30" r="2.2" fill="#FFD100" opacity="0.95"/>

  <!-- Mid hexagon vertex nodes -->
  <circle cx="50" cy="26" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="71" cy="38" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="71" cy="62" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="50" cy="74" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="29" cy="62" r="1.3" fill="white" opacity="0.45"/>
  <circle cx="29" cy="38" r="1.3" fill="white" opacity="0.45"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="#FFD100" opacity="1"/>
</svg>
