<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="c-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#002060"/>
      <stop offset="100%" stop-color="#000f3a"/>
    </linearGradient>
    <radialGradient id="c-glow" cx="75%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#FFD100" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD100" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#c-bg)"/>
  <rect width="1200" height="630" fill="url(#c-glow)"/>

  <!-- Network — right side, bold & sparse -->
  <!-- Connections — thick -->
  <line x1="800" y1="160" x2="980" y2="230" stroke="#FFD100" stroke-width="3.5" opacity="0.55"/>
  <line x1="980" y1="230" x2="860" y2="370" stroke="#FFD100" stroke-width="3.5" opacity="0.55"/>
  <line x1="980" y1="230" x2="1040" y2="400" stroke="#FFD100" stroke-width="3.5" opacity="0.4"/>
  <line x1="860" y1="370" x2="940" y2="530" stroke="#FFD100" stroke-width="3.5" opacity="0.55"/>
  <line x1="1040" y1="400" x2="940" y2="530" stroke="#FFD100" stroke-width="3.5" opacity="0.4"/>
  <line x1="800" y1="160" x2="860" y2="370" stroke="#FFD100" stroke-width="2" opacity="0.2"/>

  <!-- Nodes — large -->
  <circle cx="800" cy="160" r="18" fill="#FFD100" opacity="0.9"/>
  <circle cx="980" cy="230" r="14" fill="#FFD100" opacity="0.75"/>
  <circle cx="860" cy="370" r="22" fill="#FFD100" opacity="0.9"/>
  <circle cx="1040" cy="400" r="12" fill="#FFD100" opacity="0.6"/>
  <circle cx="940" cy="530" r="16" fill="#FFD100" opacity="0.8"/>

  <!-- Node ring on central node -->
  <circle cx="860" cy="370" r="38" fill="none" stroke="#FFD100" stroke-width="2.5" opacity="0.2"/>

  <!-- Left gold bar -->
  <rect x="90" y="0" width="8" height="630" fill="#FFD100"/>

  <!-- PALS -->
  <text x="132" y="305"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="185"
    fill="white"
    letter-spacing="-4">PALS</text>

  <!-- Research Lab -->
  <text x="138" y="375"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="48"
    fill="#FFD100"
    letter-spacing="8">RESEARCH LAB</text>

  <!-- Tagline -->
  <text x="140" y="430"
    font-family="Arial, Helvetica, sans-serif"
    font-size="24"
    fill="rgba(255,255,255,0.45)"
    letter-spacing="0.5">Advancing theory and practice in AI for Psychiatry</text>

  <!-- Divider -->
  <line x1="140" y1="450" x2="650" y2="450" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Institution -->
  <text x="140" y="556"
    font-family="Arial, Helvetica, sans-serif"
    font-size="22"
    fill="rgba(255,255,255,0.3)"
    letter-spacing="2.5">JOHNS HOPKINS UNIVERSITY</text>
</svg>
